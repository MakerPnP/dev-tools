name: makerpnpcore-w25q16jv
variants:
  - name: makerpnpcore-w25q16jv
    cores:
      - name: main
        type: armv7em
        core_access_options: !Arm
          ap: !v1 0
    memory_map:
      - !Ram
        name: AXISRAM
        range:
          start: 0x24000000
          end: 0x24020000
        access:
          boot: true
        cores:
          - main
      - !Nvm
          range:
            start: 0x70000000
            end: 0x70200000
          access:
            boot: true
          cores:
            - main
    flash_algorithms:
      - makerpnpcore-w25q16jv
flash_algorithms:
  - name: makerpnpcore-w25q16jv
    description: A flash algorithm under test
    cores:
      - main
    stack_size: 8192 # Manually added
    default: true
    instructions:
    pc_init: 0x0
    pc_uninit: 0x0
    pc_program_page: 0x0
    pc_erase_sector: 0x0
    pc_erase_all: 0x0
    data_section_offset: 0x0
    load_address: 0x24000020
    flash_properties:
      address_range:
        start: 0x0
        end: 0x0
      page_size: 0x0
      erased_byte_value: 0x0
      program_page_timeout: 0x0
      erase_sector_timeout: 0x0
      sectors:
        - size: 0x0
          address: 0x0
    stack_overflow_check: true
